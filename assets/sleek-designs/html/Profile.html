<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-accent-foreground: var(--accent-foreground);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-popover: var(--popover);
        --color-popover-foreground: var(--popover-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --color-chart-1: var(--chart-1);
        --color-chart-2: var(--chart-2);
        --color-chart-3: var(--chart-3);
        --color-chart-4: var(--chart-4);
        --color-chart-5: var(--chart-5);

        --font-font-sans: var(--font-sans);
        --font-font-heading: var(--font-heading);
        --font-font-serif: var(--font-serif);
        --font-font-mono: var(--font-mono);

        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --radius-xl: calc(var(--radius) + 4px);
      }

      :root {
        --background: #dec4bf;
        --foreground: #2a1c1e;
        --primary: #d4909a;
        --primary-foreground: #fefaf9;
        --secondary: #f4c6cc;
        --secondary-foreground: #2a1c1e;
        --muted: #e5cfcb;
        --muted-foreground: #7a6668;
        --accent: #d4c9f8;
        --accent-foreground: #2a1c1e;
        --destructive: #c96a6e;
        --card: #fefaf9;
        --card-foreground: #2a1c1e;
        --popover: #fefaf9;
        --popover-foreground: #2a1c1e;
        --border: #d6c5c2;
        --input: #f7f0ef;
        --ring: #d4909a;
        --chart-1: #b8ceac;
        --chart-2: #d4909a;
        --chart-3: #d4c9f8;
        --chart-4: #f4c6cc;
        --chart-5: #2a1c1e;

        --font-sans: "DM Sans";
        --font-heading: "Raleway";
        --font-serif: "Playfair Display";
        --font-mono: "JetBrains Mono";

        --radius: 1.5rem;
      }

      /* Prevent layout shift for icons without explicit dimensions */
      iconify-icon:not([width]):not([height]) {
        display: inline-block;
        width: 1em;
        height: 1em;
      }

      /* Hide scrollbars */
      *,
      *::before,
      *::after {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      *::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="min-h-screen bg-background text-foreground pb-24 font-sans selection:bg-primary/20">
      <header
        class="pt-16 pb-8 px-6 bg-gradient-to-b from-card to-background rounded-b-[3rem] shadow-sm"
      >
        <div class="flex flex-col items-center text-center">
          <div class="relative mb-4">
            <div
              class="w-32 h-32 rounded-full border-4 border-white shadow-xl overflow-hidden ring-4 ring-primary/20"
            >
              <img
                alt="Clara"
                src="https://randomuser.me/api/portraits/women/44.jpg"
                class="w-full h-full object-cover"
              />
            </div>
            <button
              class="absolute bottom-1 right-1 w-8 h-8 bg-primary text-primary-foreground rounded-full flex items-center justify-center shadow-lg border-2 border-white"
            >
              <iconify-icon icon="solar:camera-bold" width="16" height="16"></iconify-icon>
            </button>
          </div>
          <h2 class="font-heading text-2xl font-bold">Clara Winters</h2>
          <p class="text-muted-foreground text-sm">Level 12 • Glowera Platinum</p>
        </div>
        <div class="grid grid-cols-3 gap-4 mt-8">
          <div
            class="bg-white/40 backdrop-blur-md rounded-2xl p-4 text-center border border-white/50"
          >
            <iconify-icon
              icon="solar:fire-bold"
              class="text-chart-2 mb-1"
              width="24"
              height="24"
            ></iconify-icon>
            <div class="font-bold text-lg">14</div>
            <div class="text-[10px] text-muted-foreground uppercase tracking-widest font-bold">
              Day Streak
            </div>
          </div>
          <div
            class="bg-white/40 backdrop-blur-md rounded-2xl p-4 text-center border border-white/50"
          >
            <iconify-icon
              icon="solar:star-bold"
              class="text-chart-3 mb-1"
              width="24"
              height="24"
            ></iconify-icon>
            <div class="font-bold text-lg">8,420</div>
            <div class="text-[10px] text-muted-foreground uppercase tracking-widest font-bold">
              Points
            </div>
          </div>
          <div
            class="bg-white/40 backdrop-blur-md rounded-2xl p-4 text-center border border-white/50"
          >
            <iconify-icon
              icon="solar:medal-ribbon-bold"
              class="text-chart-1 mb-1"
              width="24"
              height="24"
            ></iconify-icon>
            <div class="font-bold text-lg">8</div>
            <div class="text-[10px] text-muted-foreground uppercase tracking-widest font-bold">
              Badges
            </div>
          </div>
        </div>
      </header>
      <main class="px-6 py-8 space-y-6">
        <section class="space-y-4">
          <h3 class="text-xs font-bold text-muted-foreground uppercase tracking-widest px-1">
            Settings &amp; Preferences
          </h3>
          <div class="bg-card rounded-3xl overflow-hidden border border-border/50">
            <button
              class="w-full flex items-center justify-between p-4 hover:bg-muted/30 transition-colors"
            >
              <div class="flex items-center gap-3">
                <div
                  class="w-10 h-10 rounded-2xl bg-secondary/20 text-secondary-foreground flex items-center justify-center"
                >
                  <iconify-icon icon="solar:bell-bold" width="20" height="20"></iconify-icon>
                </div>
                <span class="font-medium text-foreground">Notifications</span>
              </div>
              <iconify-icon
                icon="solar:alt-arrow-right-linear"
                class="text-muted-foreground"
                width="20"
                height="20"
              ></iconify-icon>
            </button>
            <div class="h-px bg-border/30 mx-4"></div>
            <button
              class="w-full flex items-center justify-between p-4 hover:bg-muted/30 transition-colors"
            >
              <div class="flex items-center gap-3">
                <div
                  class="w-10 h-10 rounded-2xl bg-accent/20 text-accent-foreground flex items-center justify-center"
                >
                  <iconify-icon
                    icon="solar:shield-check-bold"
                    width="20"
                    height="20"
                  ></iconify-icon>
                </div>
                <span class="font-medium text-foreground">Privacy &amp; Security</span>
              </div>
              <iconify-icon
                icon="solar:alt-arrow-right-linear"
                class="text-muted-foreground"
                width="20"
                height="20"
              ></iconify-icon>
            </button>
            <div class="h-px bg-border/30 mx-4"></div>
            <button
              class="w-full flex items-center justify-between p-4 hover:bg-muted/30 transition-colors"
            >
              <div class="flex items-center gap-3">
                <div
                  class="w-10 h-10 rounded-2xl bg-chart-1/20 text-chart-1 flex items-center justify-center"
                >
                  <iconify-icon icon="solar:palette-bold" width="20" height="20"></iconify-icon>
                </div>
                <span class="font-medium text-foreground">Appearance</span>
              </div>
              <iconify-icon
                icon="solar:alt-arrow-right-linear"
                class="text-muted-foreground"
                width="20"
                height="20"
              ></iconify-icon>
            </button>
          </div>
        </section>
        <section class="space-y-4">
          <h3 class="text-xs font-bold text-muted-foreground uppercase tracking-widest px-1">
            Glowera Community
          </h3>
          <div class="bg-card rounded-3xl overflow-hidden border border-border/50">
            <button
              class="w-full flex items-center justify-between p-4 hover:bg-muted/30 transition-colors"
            >
              <div class="flex items-center gap-3">
                <div
                  class="w-10 h-10 rounded-2xl bg-primary/20 text-primary flex items-center justify-center"
                >
                  <iconify-icon
                    icon="solar:users-group-rounded-bold"
                    width="20"
                    height="20"
                  ></iconify-icon>
                </div>
                <span class="font-medium text-foreground">Invite Friends</span>
              </div>
              <iconify-icon
                icon="solar:alt-arrow-right-linear"
                class="text-muted-foreground"
                width="20"
                height="20"
              ></iconify-icon>
            </button>
            <div class="h-px bg-border/30 mx-4"></div>
            <button
              class="w-full flex items-center justify-between p-4 hover:bg-muted/30 transition-colors"
            >
              <div class="flex items-center gap-3">
                <div
                  class="w-10 h-10 rounded-2xl bg-muted text-muted-foreground flex items-center justify-center"
                >
                  <iconify-icon
                    icon="solar:question-square-bold"
                    width="20"
                    height="20"
                  ></iconify-icon>
                </div>
                <span class="font-medium text-foreground">Help &amp; Support</span>
              </div>
              <iconify-icon
                icon="solar:alt-arrow-right-linear"
                class="text-muted-foreground"
                width="20"
                height="20"
              ></iconify-icon>
            </button>
          </div>
        </section>
        <button
          class="w-full py-4 text-destructive font-bold flex items-center justify-center gap-2 mt-4"
        >
          <iconify-icon icon="solar:logout-bold" width="20" height="20"></iconify-icon>Logout
        </button>
      </main>
      <nav
        class="fixed bottom-0 left-0 right-0 bg-card/90 backdrop-blur-xl border-t border-border/50 pb-safe z-50 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.05)]"
      >
        <div class="flex items-center justify-around p-2 px-4">
          <button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:home-2-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Home</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:leaf-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Garden</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:pill-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Stack</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:cup-star-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Quests</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:pen-new-square-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Journal</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-primary w-16">
            <div class="relative">
              <iconify-icon
                icon="solar:user-circle-bold"
                class="mb-1"
                width="24"
                height="24"
              ></iconify-icon>
              <div
                class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1 h-1 bg-primary rounded-full"
              ></div>
            </div>
            <span class="text-[10px] font-medium mt-1">Profile</span>
          </button>
        </div>
      </nav>
    </div>
  </body>
</html>
