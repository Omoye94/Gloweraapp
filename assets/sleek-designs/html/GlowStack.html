<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlowStack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-accent-foreground: var(--accent-foreground);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-popover: var(--popover);
        --color-popover-foreground: var(--popover-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --color-chart-1: var(--chart-1);
        --color-chart-2: var(--chart-2);
        --color-chart-3: var(--chart-3);
        --color-chart-4: var(--chart-4);
        --color-chart-5: var(--chart-5);

        --font-font-sans: var(--font-sans);
        --font-font-heading: var(--font-heading);
        --font-font-serif: var(--font-serif);
        --font-font-mono: var(--font-mono);

        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --radius-xl: calc(var(--radius) + 4px);
      }

      :root {
        --background: #dec4bf;
        --foreground: #2a1c1e;
        --primary: #d4909a;
        --primary-foreground: #fefaf9;
        --secondary: #f4c6cc;
        --secondary-foreground: #2a1c1e;
        --muted: #e5cfcb;
        --muted-foreground: #7a6668;
        --accent: #d4c9f8;
        --accent-foreground: #2a1c1e;
        --destructive: #c96a6e;
        --card: #fefaf9;
        --card-foreground: #2a1c1e;
        --popover: #fefaf9;
        --popover-foreground: #2a1c1e;
        --border: #d6c5c2;
        --input: #f7f0ef;
        --ring: #d4909a;
        --chart-1: #b8ceac;
        --chart-2: #d4909a;
        --chart-3: #d4c9f8;
        --chart-4: #f4c6cc;
        --chart-5: #2a1c1e;

        --font-sans: "DM Sans";
        --font-heading: "Raleway";
        --font-serif: "Playfair Display";
        --font-mono: "JetBrains Mono";

        --radius: 1.5rem;
      }

      /* Prevent layout shift for icons without explicit dimensions */
      iconify-icon:not([width]):not([height]) {
        display: inline-block;
        width: 1em;
        height: 1em;
      }

      /* Hide scrollbars */
      *,
      *::before,
      *::after {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      *::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="min-h-screen bg-background text-foreground pb-24 font-sans selection:bg-primary/20">
      <header class="pt-12 pb-6 px-6">
        <div class="flex items-center justify-between mb-4">
          <h1 class="font-heading text-3xl font-bold">GlowStack</h1>
          <button
            class="w-10 h-10 rounded-full bg-primary text-primary-foreground flex items-center justify-center shadow-md"
          >
            <iconify-icon icon="material-symbols:add-rounded" width="24" height="24"></iconify-icon>
          </button>
        </div>
        <p class="text-muted-foreground">Manage your daily supplement routine</p>
      </header>
      <main class="px-6 space-y-8">
        <section>
          <div class="flex items-center gap-2 mb-4">
            <iconify-icon
              icon="solar:sun-bold-duotone"
              class="text-chart-2"
              width="20"
              height="20"
            ></iconify-icon>
            <h3 class="font-heading text-lg font-semibold uppercase tracking-wide">Morning</h3>
          </div>
          <div class="space-y-3">
            <div
              class="bg-card rounded-3xl p-4 flex items-center justify-between shadow-sm border border-border/50"
            >
              <div class="flex items-center gap-4">
                <div
                  class="w-12 h-12 rounded-2xl bg-secondary/30 flex items-center justify-center text-secondary-foreground"
                >
                  <iconify-icon icon="solar:pill-bold" width="24" height="24"></iconify-icon>
                </div>
                <div>
                  <h4 class="font-bold text-foreground">Collagen Peptides</h4>
                  <p class="text-xs text-muted-foreground">1 scoop • 8:30 AM</p>
                </div>
              </div>
              <button
                class="w-10 h-10 rounded-full bg-chart-1 text-background flex items-center justify-center"
              >
                <iconify-icon icon="solar:check-read-bold" width="24" height="24"></iconify-icon>
              </button>
            </div>
            <div
              class="bg-card rounded-3xl p-4 flex items-center justify-between shadow-sm border border-border/50"
            >
              <div class="flex items-center gap-4">
                <div
                  class="w-12 h-12 rounded-2xl bg-accent/30 flex items-center justify-center text-accent-foreground"
                >
                  <iconify-icon
                    icon="solar:pill-bold-duotone"
                    width="24"
                    height="24"
                  ></iconify-icon>
                </div>
                <div>
                  <h4 class="font-bold text-foreground">Omega-3 Fish Oil</h4>
                  <p class="text-xs text-muted-foreground">1000mg • 8:30 AM</p>
                </div>
              </div>
              <button
                class="w-10 h-10 rounded-full bg-chart-1 text-background flex items-center justify-center"
              >
                <iconify-icon icon="solar:check-read-bold" width="24" height="24"></iconify-icon>
              </button>
            </div>
          </div>
        </section>
        <section>
          <div class="flex items-center gap-2 mb-4">
            <iconify-icon
              icon="solar:sun-fog-bold-duotone"
              class="text-primary"
              width="20"
              height="20"
            ></iconify-icon>
            <h3 class="font-heading text-lg font-semibold uppercase tracking-wide">Midday</h3>
          </div>
          <div class="space-y-3">
            <div
              class="bg-card rounded-3xl p-4 flex items-center justify-between shadow-sm border border-primary/20 bg-gradient-to-br from-card to-primary/5"
            >
              <div class="flex items-center gap-4">
                <div
                  class="w-12 h-12 rounded-2xl bg-primary/20 flex items-center justify-center text-primary"
                >
                  <iconify-icon icon="solar:pill-linear" width="24" height="24"></iconify-icon>
                </div>
                <div>
                  <h4 class="font-bold text-foreground">Vitamin D3</h4>
                  <p class="text-xs text-muted-foreground">2000 IU • 1:00 PM</p>
                </div>
              </div>
              <button
                class="w-10 h-10 rounded-full border-2 border-primary/30 flex items-center justify-center text-primary hover:bg-primary hover:text-white transition-all"
              >
                <iconify-icon icon="solar:check-read-bold" width="24" height="24"></iconify-icon>
              </button>
            </div>
          </div>
        </section>
        <section>
          <div class="flex items-center gap-2 mb-4">
            <iconify-icon
              icon="solar:moon-bold-duotone"
              class="text-chart-3"
              width="20"
              height="20"
            ></iconify-icon>
            <h3 class="font-heading text-lg font-semibold uppercase tracking-wide">Evening</h3>
          </div>
          <div class="space-y-3">
            <div
              class="bg-card rounded-3xl p-4 flex items-center justify-between shadow-sm border border-border/50 opacity-60"
            >
              <div class="flex items-center gap-4">
                <div
                  class="w-12 h-12 rounded-2xl bg-muted flex items-center justify-center text-muted-foreground"
                >
                  <iconify-icon icon="solar:pill-linear" width="24" height="24"></iconify-icon>
                </div>
                <div>
                  <h4 class="font-bold text-foreground">Magnesium Glycinate</h4>
                  <p class="text-xs text-muted-foreground">400mg • 9:00 PM</p>
                </div>
              </div>
              <button
                class="w-10 h-10 rounded-full border-2 border-border/50 flex items-center justify-center text-transparent"
              >
                <iconify-icon icon="solar:check-read-bold" width="24" height="24"></iconify-icon>
              </button>
            </div>
          </div>
        </section>
      </main>
      <nav
        class="fixed bottom-0 left-0 right-0 bg-card/90 backdrop-blur-xl border-t border-border/50 pb-safe z-50 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.05)]"
      >
        <div class="flex items-center justify-around p-2 px-4">
          <button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:home-2-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Home</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:leaf-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Garden</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-primary w-16">
            <div class="relative">
              <iconify-icon
                icon="solar:pill-bold"
                class="mb-1"
                width="24"
                height="24"
              ></iconify-icon>
              <div
                class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1 h-1 bg-primary rounded-full"
              ></div>
            </div>
            <span class="text-[10px] font-medium mt-1">Stack</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:cup-star-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Quests</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:pen-new-square-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Journal</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:user-circle-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Profile</span>
          </button>
        </div>
      </nav>
    </div>
  </body>
</html>
