<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenges</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-accent-foreground: var(--accent-foreground);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-popover: var(--popover);
        --color-popover-foreground: var(--popover-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --color-chart-1: var(--chart-1);
        --color-chart-2: var(--chart-2);
        --color-chart-3: var(--chart-3);
        --color-chart-4: var(--chart-4);
        --color-chart-5: var(--chart-5);

        --font-font-sans: var(--font-sans);
        --font-font-heading: var(--font-heading);
        --font-font-serif: var(--font-serif);
        --font-font-mono: var(--font-mono);

        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --radius-xl: calc(var(--radius) + 4px);
      }

      :root {
        --background: #dec4bf;
        --foreground: #2a1c1e;
        --primary: #d4909a;
        --primary-foreground: #fefaf9;
        --secondary: #f4c6cc;
        --secondary-foreground: #2a1c1e;
        --muted: #e5cfcb;
        --muted-foreground: #7a6668;
        --accent: #d4c9f8;
        --accent-foreground: #2a1c1e;
        --destructive: #c96a6e;
        --card: #fefaf9;
        --card-foreground: #2a1c1e;
        --popover: #fefaf9;
        --popover-foreground: #2a1c1e;
        --border: #d6c5c2;
        --input: #f7f0ef;
        --ring: #d4909a;
        --chart-1: #b8ceac;
        --chart-2: #d4909a;
        --chart-3: #d4c9f8;
        --chart-4: #f4c6cc;
        --chart-5: #2a1c1e;

        --font-sans: "DM Sans";
        --font-heading: "Raleway";
        --font-serif: "Playfair Display";
        --font-mono: "JetBrains Mono";

        --radius: 1.5rem;
      }

      /* Prevent layout shift for icons without explicit dimensions */
      iconify-icon:not([width]):not([height]) {
        display: inline-block;
        width: 1em;
        height: 1em;
      }

      /* Hide scrollbars */
      *,
      *::before,
      *::after {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      *::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="min-h-screen bg-background text-foreground pb-24 font-sans selection:bg-primary/20">
      <header class="pt-12 pb-6 px-6">
        <h1 class="font-heading text-3xl font-bold mb-2">Wellness Quests</h1>
        <p class="text-muted-foreground">Embark on journeys for a better you</p>
      </header>
      <main class="px-6 space-y-6">
        <section class="space-y-4">
          <div class="flex items-center justify-between">
            <h3 class="font-heading text-xl font-semibold">Active</h3>
            <span class="text-xs font-bold text-primary bg-primary/10 px-2 py-1 rounded-full"
              >2 Ongoing</span
            >
          </div>
          <div class="bg-card rounded-3xl overflow-hidden shadow-sm border border-border/50">
            <div
              class="h-28 w-full bg-gradient-to-r from-secondary/40 to-primary/40 relative p-6 flex flex-col justify-center"
            >
              <div class="absolute right-4 top-1/2 -translate-y-1/2 opacity-20">
                <iconify-icon icon="solar:leaf-bold" class="text-7xl"></iconify-icon>
              </div>
              <h4 class="font-heading text-xl font-bold">Radiant Skin Reset</h4>
              <p class="text-sm font-medium opacity-80">7-Day intensive skincare</p>
            </div>
            <div class="p-4 bg-white/50 backdrop-blur-sm">
              <div class="flex items-center justify-between mb-2">
                <span class="text-xs font-bold text-muted-foreground uppercase tracking-widest"
                  >Progress • Day 3 of 7</span
                ><span class="text-sm font-bold">42%</span>
              </div>
              <div class="w-full bg-muted/40 rounded-full h-2 mb-3">
                <div style="width: 42%" class="bg-primary h-2 rounded-full"></div>
              </div>
              <div class="flex items-center justify-between">
                <div class="flex -space-x-2">
                  <img
                    src="https://randomuser.me/api/portraits/women/12.jpg"
                    class="w-6 h-6 rounded-full border border-background"
                  /><img
                    src="https://randomuser.me/api/portraits/women/24.jpg"
                    class="w-6 h-6 rounded-full border border-background"
                  /><img
                    src="https://randomuser.me/api/portraits/women/36.jpg"
                    class="w-6 h-6 rounded-full border border-background"
                  />
                  <div
                    class="w-6 h-6 rounded-full bg-muted border border-background flex items-center justify-center text-[8px] font-bold"
                  >
                    +1.2k
                  </div>
                </div>
                <span class="text-xs text-muted-foreground">Ends in 4 days</span>
              </div>
            </div>
          </div>
          <div class="bg-card rounded-3xl overflow-hidden shadow-sm border border-border/50">
            <div
              class="h-28 w-full bg-gradient-to-r from-accent/40 to-chart-3/40 relative p-6 flex flex-col justify-center"
            >
              <div class="absolute right-4 top-1/2 -translate-y-1/2 opacity-20">
                <iconify-icon icon="solar:moon-sleep-bold" class="text-7xl"></iconify-icon>
              </div>
              <h4 class="font-heading text-xl font-bold">Dreamland Routine</h4>
              <p class="text-sm font-medium opacity-80">14-Day sleep optimization</p>
            </div>
            <div class="p-4 bg-white/50 backdrop-blur-sm">
              <div class="flex items-center justify-between mb-2">
                <span class="text-xs font-bold text-muted-foreground uppercase tracking-widest"
                  >Progress • Day 11 of 14</span
                ><span class="text-sm font-bold">78%</span>
              </div>
              <div class="w-full bg-muted/40 rounded-full h-2 mb-3">
                <div style="width: 78%" class="bg-accent h-2 rounded-full"></div>
              </div>
              <div class="flex items-center justify-between">
                <div class="flex -space-x-2">
                  <img
                    src="https://randomuser.me/api/portraits/women/1.jpg"
                    class="w-6 h-6 rounded-full border border-background"
                  /><img
                    src="https://randomuser.me/api/portraits/women/2.jpg"
                    class="w-6 h-6 rounded-full border border-background"
                  />
                  <div
                    class="w-6 h-6 rounded-full bg-muted border border-background flex items-center justify-center text-[8px] font-bold"
                  >
                    +450
                  </div>
                </div>
                <span class="text-xs text-muted-foreground">Ends in 3 days</span>
              </div>
            </div>
          </div>
        </section>
        <section class="space-y-4">
          <h3 class="font-heading text-xl font-semibold">Discover New</h3>
          <div class="grid grid-cols-2 gap-4">
            <button
              class="bg-card rounded-3xl p-5 border border-border/50 text-left hover:shadow-md transition-all group"
            >
              <div
                class="w-12 h-12 rounded-2xl bg-chart-1/20 text-chart-1 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"
              >
                <iconify-icon icon="solar:water-bold" width="24" height="24"></iconify-icon>
              </div>
              <h4 class="font-bold text-base leading-tight">Hydration Hero</h4>
              <p class="text-xs text-muted-foreground mt-2">21 Days • 500 XP</p></button
            ><button
              class="bg-card rounded-3xl p-5 border border-border/50 text-left hover:shadow-md transition-all group"
            >
              <div
                class="w-12 h-12 rounded-2xl bg-chart-2/20 text-chart-2 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"
              >
                <iconify-icon icon="solar:walking-bold" width="24" height="24"></iconify-icon>
              </div>
              <h4 class="font-bold text-base leading-tight">Daily Strides</h4>
              <p class="text-xs text-muted-foreground mt-2">30 Days • 1000 XP</p>
            </button>
          </div>
        </section>
      </main>
      <nav
        class="fixed bottom-0 left-0 right-0 bg-card/90 backdrop-blur-xl border-t border-border/50 pb-safe z-50 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.05)]"
      >
        <div class="flex items-center justify-around p-2 px-4">
          <button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:home-2-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Home</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:leaf-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Garden</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:pill-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Stack</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-primary w-16">
            <div class="relative">
              <iconify-icon
                icon="solar:cup-star-bold"
                class="mb-1"
                width="24"
                height="24"
              ></iconify-icon>
              <div
                class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1 h-1 bg-primary rounded-full"
              ></div>
            </div>
            <span class="text-[10px] font-medium mt-1">Quests</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:pen-new-square-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Journal</span></button
          ><button class="flex flex-col items-center justify-center p-2 text-muted-foreground w-16">
            <iconify-icon
              icon="solar:user-circle-linear"
              class="mb-1"
              width="24"
              height="24"
            ></iconify-icon
            ><span class="text-[10px] font-medium mt-1">Profile</span>
          </button>
        </div>
      </nav>
    </div>
  </body>
</html>
